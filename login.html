<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — InvoiceAI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--gray-50); }
    .login-wrap { width: 100%; max-width: 400px; padding: 24px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-icon {
      width: 56px; height: 56px;
      background: var(--navy);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 12px;
    }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--gray-800); }
    .login-logo p { font-size: 13px; color: var(--gray-400); margin-top: 4px; }
    .login-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 32px; box-shadow: var(--shadow-lg); }
    .login-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .login-card .subtitle { font-size: 13px; color: var(--gray-400); margin-bottom: 24px; }
    .btn-login {
      width: 100%; padding: 12px; border: none; border-radius: var(--radius);
      background: var(--navy); color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .15s; margin-top: 8px;
    }
    .btn-login:hover { background: var(--navy-light); }
    .form-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-600); margin-top: 12px; }
    .form-check input { width: 15px; height: 15px; accent-color: var(--sky); }
    .divider { border: none; border-top: 1px solid var(--gray-200); margin: 20px 0; }
    .sso-btn {
      width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius);
      background: var(--white); font-size: 13px; font-weight: 600; color: var(--gray-600);
      display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
      transition: background .15s;
    }
    .sso-btn:hover { background: var(--gray-100); }
    .login-footer { text-align: center; font-size: 12px; color: var(--gray-400); margin-top: 20px; }
    .login-footer a { color: var(--sky); }
    .pwd-wrap { position: relative; }
    .pwd-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; font-size: 16px; color: var(--gray-400); cursor: pointer;
    }
    .badge-mfa {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--sky-light); color: var(--sky-dark);
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">📄</div>
      <h1>InvoiceAI</h1>
      <p>請求書AI自動処理システム</p>
    </div>

    <div class="login-card">
      <h2>ログイン</h2>
      <p class="subtitle">アカウント情報を入力してください</p>

      <div class="form-group">
        <label class="form-label">メールアドレス</label>
        <input type="email" class="form-control" placeholder="your@company.co.jp" value="yamada@sample-corp.co.jp">
      </div>

      <div class="form-group">
        <label class="form-label">
          パスワード
          <span class="badge-mfa">🔐 MFA有効</span>
        </label>
        <div class="pwd-wrap">
          <input type="password" class="form-control" placeholder="パスワードを入力" value="••••••••">
          <button class="pwd-toggle">👁</button>
        </div>
      </div>

      <div class="form-check">
        <input type="checkbox" id="remember" checked>
        <label for="remember">ログイン状態を保持する</label>
      </div>

      <a href="dashboard.html">
        <button class="btn-login">ログイン</button>
      </a>

      <hr class="divider">

      <button class="sso-btn">
        🏢 &nbsp;シングルサインオン（SSO）でログイン
      </button>
    </div>

    <p class="login-footer">
      パスワードを忘れた方は <a href="#">こちら</a> &nbsp;｜&nbsp; <a href="#">利用規約</a>
    </p>
  </div>
</body>
</html>
