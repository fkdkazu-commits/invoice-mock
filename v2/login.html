<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — InvoiceAI v2</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex; min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
      position: relative; overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(37,99,235,.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(16,185,129,.1) 0%, transparent 50%);
    }
    .login-wrap {
      width: 100%; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; z-index: 1;
    }
    .login-panel {
      width: 100%; max-width: 420px;
    }
    .login-logo {
      text-align: center; margin-bottom: 32px;
    }
    .login-logo-mark {
      width: 56px; height: 56px; background: var(--blue);
      border-radius: 16px; display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 16px; color: #fff;
      box-shadow: 0 8px 24px rgba(37,99,235,.4);
    }
    .login-logo h1 { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .login-logo p { font-size: 13px; color: rgba(255,255,255,.45); margin-top: 4px; }
    .login-card {
      background: var(--white); border-radius: 16px;
      padding: 36px; box-shadow: 0 24px 48px rgba(0,0,0,.35);
    }
    .login-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .login-card .subtitle { font-size: 13px; color: var(--gray-400); margin-bottom: 24px; }
    .btn-login {
      width: 100%; padding: 12px; border: none; border-radius: var(--radius);
      background: var(--blue); color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background .15s; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      height: 46px;
    }
    .btn-login:hover { background: var(--blue-dark); }
    .btn-login:disabled { opacity: .7; cursor: not-allowed; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .form-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-600); margin-top: 12px; }
    .form-check input { width: 15px; height: 15px; accent-color: var(--blue); }
    .divider { border: none; border-top: 1px solid var(--gray-200); margin: 20px 0; position: relative; }
    .divider-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: var(--white); padding: 0 10px;
      font-size: 11px; color: var(--gray-400); white-space: nowrap;
    }
    .sso-btn {
      width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius);
      background: var(--white); font-size: 13px; font-weight: 600; color: var(--gray-600);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer; transition: background .15s;
    }
    .sso-btn:hover { background: var(--gray-50); }
    .login-footer { text-align: center; font-size: 12px; color: rgba(255,255,255,.4); margin-top: 20px; }
    .login-footer a { color: rgba(255,255,255,.65); }
    .login-footer a:hover { color: #fff; }
    .pwd-wrap { position: relative; }
    .pwd-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--gray-400); cursor: pointer; padding: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .badge-mfa {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--blue-light); color: var(--blue);
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-left: 8px;
    }
    .demo-hint {
      font-size: 11px; color: var(--gray-400);
      background: var(--gray-50); border: 1px solid var(--gray-200);
      border-radius: var(--radius); padding: 8px 12px; margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-panel">
      <div class="login-logo">
        <div class="login-logo-mark">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/>
          </svg>
        </div>
        <h1>InvoiceAI</h1>
        <p>請求書AI自動処理システム</p>
      </div>

      <div class="login-card">
        <h2>ログイン</h2>
        <p class="subtitle">アカウント情報を入力してください</p>

        <div class="demo-hint">
          <strong>デモ用アカウント：</strong> yamada@sample-corp.co.jp / demo1234
        </div>

        <div class="form-group">
          <label class="form-label">メールアドレス</label>
          <input type="email" id="email" class="form-control" placeholder="your@company.co.jp" value="yamada@sample-corp.co.jp">
        </div>

        <div class="form-group">
          <label class="form-label">
            パスワード
            <span class="badge-mfa">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              MFA有効
            </span>
          </label>
          <div class="pwd-wrap">
            <input type="password" id="password" class="form-control" placeholder="パスワードを入力" value="demo1234">
            <button class="pwd-toggle" onclick="togglePwd()" type="button">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-check">
          <input type="checkbox" id="remember" checked>
          <label for="remember">ログイン状態を保持する</label>
        </div>

        <button class="btn-login" id="login-btn" onclick="doLogin()">
          <span id="btn-text">ログイン</span>
          <div class="spinner" id="spinner"></div>
        </button>

        <hr class="divider"><span class="divider-text">または</span>

        <button class="sso-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
          </svg>
          シングルサインオン（SSO）でログイン
        </button>
      </div>

      <p class="login-footer">
        パスワードを忘れた方は <a href="#">こちら</a> &nbsp;｜&nbsp; <a href="#">利用規約</a>
      </p>
    </div>
  </div>

  <script>
    function togglePwd() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function doLogin() {
      const btn = document.getElementById('login-btn');
      const text = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');
      btn.disabled = true;
      text.textContent = '認証中...';
      spinner.style.display = 'block';
      setTimeout(() => {
        text.textContent = '✓ 認証完了';
        spinner.style.display = 'none';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 400);
      }, 1400);
    }
  </script>
</body>
</html>
